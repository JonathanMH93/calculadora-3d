<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora 3D PRO</title>

<link rel="manifest" href="manifest.json">

<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --primary: #2563eb;
  --text: #f1f5f9;
  --accent: #22c55e;
}

body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
  color: var(--text);
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 15px;
}

.tabs {
  display: flex;
  margin-bottom: 10px;
}

.tab {
  flex: 1;
  padding: 10px;
  text-align: center;
  background: #334155;
  cursor: pointer;
}

.active {
  background: var(--primary);
}

.card {
  background: var(--card);
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
  border-radius: 8px;
  border: none;
  background: #334155;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  background: var(--primary);
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 16px;
}

.total {
  font-size: 26px;
  text-align: center;
  color: var(--accent);
}

</style>
</head>

<body>

<div class="container">

  <div class="tabs">
    <div class="tab active" onclick="mostrar('calc', this)">💰 Calcular</div>
    <div class="tab" onclick="mostrar('config', this)">⚙️ Config</div>
  </div>

  <!-- PANTALLA CALCULAR -->
  <div id="calc">

    <div class="card">
      <label>Filamento (gr)</label>
      <input type="number" id="filamento">
    </div>

    <div class="card">
      <label>Horas</label>
      <input type="number" id="horas">
      <label>Minutos</label>
      <input type="number" id="minutos">
    </div>

    <button onclick="calcular()">CALCULAR</button>

    <div class="card total">
      $ <span id="total">0</span>
    </div>

  </div>

  <!-- PANTALLA CONFIG -->
  <div id="config" style="display:none">

    <div class="card">
      <label>% Extra Filamento</label>
      <input type="number" id="extraFil">
    </div>

    <div class="card">
      <label>% Extra Tiempo</label>
      <input type="number" id="extraTime">
    </div>

    <div class="card">
      <label>% Ganancia</label>
      <input type="number" id="ganancia">
    </div>

    <div class="card">
      <label>Costo kg ($)</label>
      <input type="number" id="costoKg">

      <label>Costo hora máquina ($)</label>
      <input type="number" id="costoHora">

      <label>Energía hora ($)</label>
      <input type="number" id="energiaHora">
    </div>

    <button onclick="guardar()">GUARDAR CONFIG</button>

  </div>

</div>

<script>

// CONFIG POR DEFECTO
let config = {
  extraFil: 20,
  extraTime: 10,
  ganancia: 60,
  costoKg: 20,
  costoHora: 0.23,
  energiaHora: 0.20
};

// CARGAR CONFIG
function cargarConfig() {
  let data = localStorage.getItem("config3d");
  if (data) config = JSON.parse(data);

  document.getElementById("extraFil").value = config.extraFil;
  document.getElementById("extraTime").value = config.extraTime;
  document.getElementById("ganancia").value = config.ganancia;
  document.getElementById("costoKg").value = config.costoKg;
  document.getElementById("costoHora").value = config.costoHora;
  document.getElementById("energiaHora").value = config.energiaHora;
}

// GUARDAR CONFIG
function guardar() {
  config.extraFil = parseFloat(document.getElementById("extraFil").value) || 0;
  config.extraTime = parseFloat(document.getElementById("extraTime").value) || 0;
  config.ganancia = parseFloat(document.getElementById("ganancia").value) || 0;
  config.costoKg = parseFloat(document.getElementById("costoKg").value) || 0;
  config.costoHora = parseFloat(document.getElementById("costoHora").value) || 0;
  config.energiaHora = parseFloat(document.getElementById("energiaHora").value) || 0;

  localStorage.setItem("config3d", JSON.stringify(config));
  alert("Configuración guardada");
}

// CALCULAR
function calcular() {

  let fil = parseFloat(document.getElementById("filamento").value) || 0;
  let h = parseFloat(document.getElementById("horas").value) || 0;
  let m = parseFloat(document.getElementById("minutos").value) || 0;

  let filExtra = fil * (1 + config.extraFil / 100);
  let costoFil = (filExtra / 1000) * config.costoKg;

  let tiempo = (h + m/60) * (1 + config.extraTime / 100);
  let costoTiempo = tiempo * (config.costoHora + config.energiaHora);

  let subtotal = costoFil + costoTiempo;
  let total = subtotal * (1 + config.ganancia / 100);

  document.getElementById("total").innerText = total.toFixed(2);
}

// CAMBIAR PANTALLA
function mostrar(tab, el) {
  document.getElementById("calc").style.display = tab === 'calc' ? 'block' : 'none';
  document.getElementById("config").style.display = tab === 'config' ? 'block' : 'none';

  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

// INIT
cargarConfig();

// SERVICE WORKER
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
