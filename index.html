<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D App PRO</title>

<style>
*{box-sizing:border-box}
body{font-family:Arial;background:#0f172a;color:#fff;margin:0}
.container{max-width:1100px;margin:auto;padding:20px}
.tabs{display:flex;gap:5px;margin-bottom:15px}
.tab{flex:1;padding:12px;background:#334155;cursor:pointer;text-align:center;border-radius:8px}
.active{background:#2563eb}
.card{background:#1e293b;padding:15px;margin-bottom:10px;border-radius:12px}
input,textarea{width:100%;padding:12px;margin:6px 0;background:#334155;color:#fff;border:none;border-radius:8px}
label{font-size:13px;color:#94a3b8;display:block;margin-top:8px}
button{padding:10px;margin:3px;background:#2563eb;color:#fff;border:none;border-radius:8px;cursor:pointer}
button.danger{background:#dc2626}
button.gray{background:#64748b}
.line{display:flex;justify-content:space-between;align-items:center}
.total{font-size:22px;color:#22c55e}
.toast{
position:fixed;
bottom:20px;
right:20px;
background:#16a34a;
padding:12px 18px;
border-radius:10px;
display:none;
}
.badge{
padding:4px 8px;
border-radius:6px;
font-size:12px;
}
.pagado{background:#16a34a}
.pendiente{background:#dc2626}
</style>
</head>

<body>

<div class="container">

<div class="tabs">
<div class="tab active" onclick="mostrar('calc',this)">💰 Calcular</div>
<div class="tab" onclick="mostrar('quotes',this)">📦 Cotizaciones</div>
<div class="tab" onclick="mostrar('sales',this)">💵 Ventas</div>
<div class="tab" onclick="mostrar('config',this)">⚙️ Config</div>
</div>

<!-- CALC -->
<div id="calc">
<div class="card">
<label>Filamento (g)</label>
<input id="fil" type="number" min="0">
<label>Horas</label>
<input id="h" type="number" min="0">
<label>Minutos</label>
<input id="m" type="number" min="0">
</div>

<button onclick="calcular()">Calcular</button>

<div class="card total">$ <span id="total">0</span></div>

<button id="btnCot" style="display:none" onclick="irCot()">📌 Cotizar</button>
</div>

<!-- COT -->
<div id="quotes" style="display:none">

<div class="card">
<input type="hidden" id="cotId">

<label>Descripción</label>
<textarea id="desc"></textarea>

<label>Enlace</label>
<input id="link">

<label>Observaciones</label>
<textarea id="obs"></textarea>

<button onclick="guardarCot()">Guardar</button>
<button class="gray" onclick="limpiarCot()">Cancelar</button>
</div>

<div id="listaCot"></div>

</div>

<!-- VENTAS -->
<div id="sales" style="display:none">

<div class="card">
<input type="hidden" id="ventaId">

<label>Cliente</label>
<input id="cliente">

<label>Precio</label>
<input id="precio" type="number" step="0.01">

<label>Figura</label>
<input id="figura">

<input type="checkbox" id="pagado"> Pagado

<button onclick="guardarVenta()">Guardar venta</button>
<button class="gray" onclick="limpiarVenta()">Cancelar</button>
</div>

<div id="listaVentas"></div>

</div>

<!-- CONFIG -->
<div id="config" style="display:none">
<div class="card">

<label>Costo kg</label>
<input id="costoKg" type="number" step="0.01">

<label>% extra filamento</label>
<input id="extraFil" type="number">

<label>% extra tiempo</label>
<input id="extraTime" type="number">

<label>Costo máquina</label>
<input id="costoHora" type="number" step="0.01">

<label>Costo energía</label>
<input id="costoEnergia" type="number" step="0.01">

<button onclick="guardarConfig()">Guardar</button>

</div>
</div>

</div>

<div id="toast" class="toast"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyClTMXXUlDDK0txPwr1Q5SFYkytC9RQvGA",
authDomain:"calculadora-3d-876b3.firebaseapp.com",
projectId:"calculadora-3d-876b3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db=db;
window.collection=collection;
window.addDoc=addDoc;
window.getDocs=getDocs;
window.deleteDoc=deleteDoc;
window.doc=doc;
window.updateDoc=updateDoc;
window.getDoc=getDoc;
window.setDoc=setDoc;
window.serverTimestamp=serverTimestamp;
</script>

<script>

let config={}
let ultima={}
let cotizacionesCache=[]
let ventasCache=[]

function toast(msg){
let t=document.getElementById("toast")
t.innerText=msg
 t.style.display="block"
 setTimeout(()=>t.style.display="none",2000)
}

function money(n){
return Number(n).toLocaleString("es-EC",{
style:"currency",
currency:"USD"
})
}

// CONFIG
async function cargarConfig(){
let ref=doc(db,"config","default")
let snap=await getDoc(ref)

if(snap.exists()){
config=snap.data()
}else{
config={
costoKg:20,
extraFil:20,
extraTime:10,
costoHora:0.23,
costoEnergia:0.2
}
await setDoc(ref,config)
}

costoKg.value=config.costoKg
extraFil.value=config.extraFil
extraTime.value=config.extraTime
costoHora.value=config.costoHora
costoEnergia.value=config.costoEnergia
}

async function guardarConfig(){
config.costoKg=+costoKg.value
config.extraFil=+extraFil.value
config.extraTime=+extraTime.value
config.costoHora=+costoHora.value
config.costoEnergia=+costoEnergia.value

await setDoc(doc(db,"config","default"),config)

toast("Configuración guardada")
}

// CALC
function calcular(){
let f=+fil.value||0
let h1=+h.value||0
let m1=+m.value||0

let total=((f*(1+config.extraFil/100)/1000)*config.costoKg)+
((h1+m1/60)*(1+config.extraTime/100)*(config.costoHora+config.costoEnergia))

total*=1.6

document.getElementById("total").innerText=money(total)

ultima={
f,
h:h1,
m:m1,
total,
fecha:new Date()
}

btnCot.style.display="block"
}

function irCot(){
mostrar("quotes",document.querySelectorAll(".tab")[1])
}

// COTIZACIONES
async function guardarCot(){
if(!desc.value)return alert("Descripción requerida")

let id=cotId.value

let data={
...ultima,
desc:desc.value,
link:link.value,
obs:obs.value,
fecha:serverTimestamp()
}

if(id){
await updateDoc(doc(db,"cotizaciones",id),data)
toast("Cotización actualizada")
}else{
await addDoc(collection(db,"cotizaciones"),data)
toast("Cotización guardada")
}

limpiarCot()
cargarCot()
}

function limpiarCot(){
cotId.value=""
desc.value=""
link.value=""
obs.value=""
}

async function cargarCot(){
let snap=await getDocs(collection(db,"cotizaciones"))
cotizacionesCache=[]
let html=""

snap.forEach(d=>{
let c={id:d.id,...d.data()}
cotizacionesCache.push(c)

html+=`<div class="card line">
<div>
<b>${c.desc}</b><br>
${money(c.total)}
</div>
<div>
<button onclick="editarCot('${c.id}')">✏️</button>
<button onclick="crearVenta('${c.id}')">💰</button>
<button class="danger" onclick="eliminarCot('${c.id}')">🗑</button>
</div>
</div>`
})

listaCot.innerHTML=html
}

function editarCot(id){
let c=cotizacionesCache.find(x=>x.id==id)

cotId.value=c.id

desc.value=c.desc||""
link.value=c.link||""
obs.value=c.obs||""

mostrar("quotes",document.querySelectorAll(".tab")[1])
}

async function eliminarCot(id){
if(!confirm("Eliminar cotización?"))return
await deleteDoc(doc(db,"cotizaciones",id))
toast("Eliminado")
cargarCot()
}

function crearVenta(id){
let c=cotizacionesCache.find(x=>x.id==id)

mostrar("sales",document.querySelectorAll(".tab")[2])

setTimeout(()=>{
precio.value=c.total
figura.value=c.desc
},50)
}

// VENTAS
async function guardarVenta(){
if(!cliente.value)return alert("Cliente requerido")

let id=ventaId.value

let data={
cliente:cliente.value,
precio:+precio.value,
figura:figura.value,
pagado:pagado.checked,
fecha:serverTimestamp()
}

if(id){
await updateDoc(doc(db,"ventas",id),data)
toast("Venta actualizada")
}else{
await addDoc(collection(db,"ventas"),data)
toast("Venta guardada")
}

limpiarVenta()
cargarVentas()
}

function limpiarVenta(){
ventaId.value=""
cliente.value=""
precio.value=""
figura.value=""
pagado.checked=false
}

async function cargarVentas(){
let snap=await getDocs(collection(db,"ventas"))
ventasCache=[]
let html=""

snap.forEach(d=>{
let v={id:d.id,...d.data()}
ventasCache.push(v)

html+=`<div class="card line">
<div>
<b>${v.figura}</b><br>
${money(v.precio)}<br>
<span class="badge ${v.pagado?"pagado":"pendiente"}">
${v.pagado?"Pagado":"Pendiente"}
</span>
</div>
<div>
<button onclick="editarVenta('${v.id}')">✏️</button>
<button class="danger" onclick="eliminarVenta('${v.id}')">🗑</button>
</div>
</div>`
})

listaVentas.innerHTML=html
}

function editarVenta(id){
let v=ventasCache.find(x=>x.id==id)

ventaId.value=v.id
cliente.value=v.cliente
precio.value=v.precio
figura.value=v.figura
pagado.checked=v.pagado

mostrar("sales",document.querySelectorAll(".tab")[2])
}

async function eliminarVenta(id){
if(!confirm("Eliminar venta?"))return
await deleteDoc(doc(db,"ventas",id))
toast("Venta eliminada")
cargarVentas()
}

// UI
function mostrar(tab,el){

calc.style.display=tab=="calc"?"block":"none"
quotes.style.display=tab=="quotes"?"block":"none"
sales.style.display=tab=="sales"?"block":"none"
config.style.display=tab=="config"?"block":"none"

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
el.classList.add("active")

if(tab=="quotes")cargarCot()
if(tab=="sales")cargarVentas()
if(tab=="config")cargarConfig()
}

// INIT
cargarConfig()

</script>

</body>
</html>
