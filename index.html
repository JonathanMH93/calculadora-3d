<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora 3D PRO</title>

<style>
:root {
  --bg:#0f172a;
  --card:#1e293b;
  --primary:#2563eb;
  --text:#f1f5f9;
  --accent:#22c55e;
}

body {
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

.container {
  max-width:420px;
  margin:auto;
  padding:15px;
}

.tabs {
  display:flex;
  margin-bottom:10px;
}

.tab {
  flex:1;
  padding:10px;
  text-align:center;
  background:#334155;
  cursor:pointer;
}

.active {
  background:var(--primary);
}

.card {
  background:var(--card);
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
}

input, textarea {
  width:100%;
  padding:8px;
  margin:5px 0;
  border-radius:8px;
  border:none;
  background:#334155;
  color:white;
}

button {
  width:100%;
  padding:12px;
  background:var(--primary);
  border:none;
  border-radius:10px;
  color:white;
  margin-top:5px;
}

.total {
  font-size:26px;
  text-align:center;
  color:var(--accent);
}

.item {
  background:#334155;
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
}

img {
  max-width:100%;
  border-radius:8px;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="container">

<div class="tabs">
  <div class="tab active" onclick="mostrar('calc',this)">💰 Calcular</div>
  <div class="tab" onclick="mostrar('config',this)">⚙️ Config</div>
  <div class="tab" onclick="mostrar('quotes',this)">📦 Cotizaciones</div>
</div>

<!-- CALC -->
<div id="calc">

<div class="card">
<label>Filamento (gr)</label>
<input type="number" id="filamento">
</div>

<div class="card">
<label>Horas</label>
<input type="number" id="horas">
<label>Minutos</label>
<input type="number" id="minutos">
</div>

<button onclick="calcular()">CALCULAR</button>

<div class="card total">
$ <span id="total">0</span>
</div>

<button id="btnCotizar" style="display:none" onclick="abrirCotizar()">📌 COTIZAR</button>

</div>

<!-- CONFIG -->
<div id="config" style="display:none">

<div class="card">
<label>% Extra Filamento</label>
<input type="number" id="extraFil">
</div>

<div class="card">
<label>% Extra Tiempo</label>
<input type="number" id="extraTime">
</div>

<div class="card">
<label>% Ganancia</label>
<input type="number" id="ganancia">
</div>

<div class="card">
<label>Costo kg ($)</label>
<input type="number" id="costoKg">
<label>Costo hora máquina ($)</label>
<input type="number" id="costoHora">
<label>Energía hora ($)</label>
<input type="number" id="energiaHora">
</div>

<button onclick="guardarConfig()">GUARDAR</button>

</div>

<!-- COTIZACIONES -->
<div id="quotes" style="display:none">

<div class="card">
<label>Descripción</label>
<textarea id="desc"></textarea>

<label>Enlace (opcional)</label>
<input type="text" id="link">

<label>Configuraciones (opcional)</label>
<textarea id="configExtra"></textarea>

<label>Foto (opcional)</label>
<input type="file" id="foto">

<button onclick="guardarCotizacion()">💾 Guardar Cotización</button>
</div>

<div id="lista"></div>

</div>

</div>

<script>

// CONFIG
let config = {
  extraFil:20,
  extraTime:10,
  ganancia:60,
  costoKg:20,
  costoHora:0.23,
  energiaHora:0.20
};

let ultima = {};

// CARGAR CONFIG
function cargarConfig(){
  let data = localStorage.getItem("config3d");
  if(data) config = JSON.parse(data);

  extraFil.value = config.extraFil;
  extraTime.value = config.extraTime;
  ganancia.value = config.ganancia;
  costoKg.value = config.costoKg;
  costoHora.value = config.costoHora;
  energiaHora.value = config.energiaHora;
}

// GUARDAR CONFIG
function guardarConfig(){
  config.extraFil = parseFloat(extraFil.value)||0;
  config.extraTime = parseFloat(extraTime.value)||0;
  config.ganancia = parseFloat(ganancia.value)||0;
  config.costoKg = parseFloat(costoKg.value)||0;
  config.costoHora = parseFloat(costoHora.value)||0;
  config.energiaHora = parseFloat(energiaHora.value)||0;

  localStorage.setItem("config3d", JSON.stringify(config));
  alert("Guardado");
}

// CALCULAR
function calcular(){
  let fil = parseFloat(filamento.value)||0;
  let h = parseFloat(horas.value)||0;
  let m = parseFloat(minutos.value)||0;

  let filExtra = fil*(1+config.extraFil/100);
  let costoFil = (filExtra/1000)*config.costoKg;

  let tiempo = (h+m/60)*(1+config.extraTime/100);
  let costoTiempo = tiempo*(config.costoHora+config.energiaHora);

  let total = (costoFil + costoTiempo)*(1+config.ganancia/100);

  document.getElementById("total").innerText = total.toFixed(2);

  ultima = {fil,h,m,total:total.toFixed(2)};

  document.getElementById("btnCotizar").style.display="block";
}

// ABRIR COTIZAR
function abrirCotizar(){
  mostrar('quotes', document.querySelectorAll('.tab')[2]);
}

// GUARDAR COTIZACION
function guardarCotizacion(){

  let reader = new FileReader();
  let file = foto.files[0];

  if(file){
    reader.onload = function(){
      guardarFinal(reader.result);
    }
    reader.readAsDataURL(file);
  } else {
    guardarFinal(null);
  }
}

function guardarFinal(img){

  let cot = {
    ...ultima,
    desc: desc.value,
    link: link.value,
    extra: configExtra.value,
    img: img,
    fecha: new Date().toLocaleString()
  };

  let lista = JSON.parse(localStorage.getItem("cotizaciones")||"[]");
  lista.unshift(cot);

  localStorage.setItem("cotizaciones", JSON.stringify(lista));

  desc.value="";
  link.value="";
  configExtra.value="";
  foto.value="";

  cargarCotizaciones();
}

// MOSTRAR LISTA
function cargarCotizaciones(){
  let lista = JSON.parse(localStorage.getItem("cotizaciones")||"[]");

  let html="";
  lista.forEach(c=>{
    html += `
    <div class="item">
      <b>${c.desc||"Sin nombre"}</b><br>
      💰 $${c.total}<br>
      ⚖️ ${c.fil}gr<br>
      ⏱️ ${c.h}h ${c.m}m<br>
      📅 ${c.fecha}<br>
      ${c.link ? `<a href="${c.link}" target="_blank">Ver enlace</a>`:""}
      ${c.img ? `<img src="${c.img}">`:""}
    </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;
}

// TABS
function mostrar(tab, el){
  calc.style.display = tab=='calc'?'block':'none';
  config.style.display = tab=='config'?'block':'none';
  quotes.style.display = tab=='quotes'?'block':'none';

  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');

  if(tab=='quotes') cargarCotizaciones();
}

// INIT
cargarConfig();

</script>

</body>
</html>
