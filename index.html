<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D App PRO</title>

<style>
*{box-sizing:border-box}
body{font-family:Arial;background:#0f172a;color:#fff;margin:0}
.container{max-width:1100px;margin:auto;padding:20px}
.tabs{display:flex;gap:5px;margin-bottom:15px}
.tab{flex:1;padding:12px;background:#334155;cursor:pointer;text-align:center;border-radius:8px}
.active{background:#2563eb}
.card{background:#1e293b;padding:15px;margin-bottom:10px;border-radius:12px}
input,textarea{width:100%;padding:12px;margin:6px 0;background:#334155;color:#fff;border:none;border-radius:8px}
label{font-size:13px;color:#94a3b8;display:block;margin-top:8px}
button{padding:10px;margin:3px;background:#2563eb;color:#fff;border:none;border-radius:8px;cursor:pointer}
button.danger{background:#dc2626}
button.gray{background:#64748b}
.line{display:flex;justify-content:space-between;align-items:center}
.total{font-size:22px;color:#22c55e}
.toast{position:fixed;bottom:20px;right:20px;background:#16a34a;padding:12px 18px;border-radius:10px;display:none}
.badge{padding:4px 8px;border-radius:6px;font-size:12px}
.pagado{background:#16a34a}
.pendiente{background:#dc2626}
img{max-width:120px;border-radius:8px;margin-top:8px}
</style>
</head>

<body>

<div class="container">

<div class="tabs">
<div class="tab active" id="tabCalc" onclick="mostrar('calc',this)">💵 Calcular</div>
<div class="tab" id="tabQuotes" onclick="mostrar('quotes',this)">📦 Cotizaciones</div>
<div class="tab" id="tabSales" onclick="mostrar('sales',this)">💵 Ventas</div>
<div class="tab" id="tabConfig" onclick="mostrar('config',this)">⚙️ Config</div>
</div>

<!-- CALC -->
<div id="calc">
<div class="card">
<label>Filamento (g)</label>
<input id="fil" type="number" min="0">
<label>Horas</label>
<input id="h" type="number" min="0">
<label>Minutos</label>
<input id="m" type="number" min="0">
</div>

<button onclick="calcular()">Calcular</button>

<div class="card total"><span id="total">$ 0.00</span></div>

<button id="btnCot" style="display:none" onclick="irCot()">📌 Cotizar</button>
</div>

<!-- COT -->
<div id="quotes" style="display:none">

<div class="card">
<input type="hidden" id="cotId">

<label>Descripción</label>
<textarea id="desc"></textarea>

<label>Enlace</label>
<input id="link">

<label>Foto</label>
<input type="file" id="foto">

<label>Observaciones</label>
<textarea id="obs"></textarea>

<button onclick="guardarCot()">Guardar</button>
<button class="gray" onclick="limpiarCot()">Cancelar</button>
<button onclick="cargarCot()">🔄 Refrescar</button>
</div>

<div id="listaCot"></div>

<div id="detalleCot"></div>

</div>

<!-- VENTAS -->
<div id="sales" style="display:none">

<div class="card">
<input type="hidden" id="ventaId">

<label>Cliente</label>
<input id="cliente">

<label>Precio</label>
<input id="precio" type="number" step="0.01">

<label>Figura</label>
<input id="figura">

<input type="checkbox" id="pagado"> Pagado

<button onclick="guardarVenta()">Guardar venta</button>
<button class="gray" onclick="limpiarVenta()">Cancelar</button>
<button onclick="cargarVentas()">🔄 Refrescar</button>
</div>

<div id="listaVentas"></div>

</div>

<!-- CONFIG -->
<div id="config" style="display:none">
<div class="card">

<label>Costo kg</label>
<input id="costoKg" type="number" step="0.01">

<label>% extra filamento</label>
<input id="extraFil" type="number">

<label>% extra tiempo</label>
<input id="extraTime" type="number">

<label>Costo máquina</label>
<input id="costoHora" type="number" step="0.01">

<label>Costo energía</label>
<input id="costoEnergia" type="number" step="0.01">

<button onclick="guardarConfig()">Guardar</button>

</div>
</div>

</div>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyClTMXXUlDDK0txPwr1Q5SFYkytC9RQvGA",
authDomain:"calculadora-3d-876b3.firebaseapp.com",
projectId:"calculadora-3d-876b3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db=db;
window.collection=collection;
window.addDoc=addDoc;
window.getDocs=getDocs;
window.deleteDoc=deleteDoc;
window.doc=doc;
window.updateDoc=updateDoc;
window.getDoc=getDoc;
window.setDoc=setDoc;
window.serverTimestamp=serverTimestamp;
</script>

<script>

// =============================
// ESTADO GLOBAL
// =============================

let config = {
  costoKg: 20,
  extraFil: 20,
  extraTime: 10,
  costoHora: 0.23,
  costoEnergia: 0.2
}

let ultima = null
let editandoCotId = null
let editandoVentaId = null
let imgData = null

// =============================
// UTILIDADES
// =============================

function toast(msg){
  alert(msg)
}

function formatearFechaInput(fecha){
  try{
    const d = new Date(fecha)
    return d.toISOString().split('T')[0]
  }catch{
    return ''
  }
}

function limpiarFormCot(){
  document.getElementById("figura").value = ""
  document.getElementById("precio").value = ""
  document.getElementById("obs").value = ""
  document.getElementById("link").value = ""
  document.getElementById("foto").value = ""
  imgData = null
  editandoCotId = null
}

function limpiarFormVenta(){
  document.getElementById("cliente").value = ""
  document.getElementById("ventaPrecio").value = ""
  document.getElementById("ventaObs").value = ""
  document.getElementById("ventaFecha").value = formatearFechaInput(new Date())
  document.getElementById("pagadoCheck").checked = false
  editandoVentaId = null
}

// =============================
// NAVEGACION
// =============================

function mostrar(tab,el){

  const calcDiv=document.getElementById("calc")
  const quotesDiv=document.getElementById("quotes")
  const salesDiv=document.getElementById("sales")
  const configDiv=document.getElementById("config")

  calcDiv.style.display="none"
  quotesDiv.style.display="none"
  salesDiv.style.display="none"
  configDiv.style.display="none"

  const target=document.getElementById(tab)
  if(target) target.style.display="block"

  const tabs=document.querySelectorAll(".tab")
  tabs.forEach(t=>t.classList.remove("active"))
  if(el) el.classList.add("active")

  if(tab=="quotes") cargarCot()
  if(tab=="sales") cargarVentas()
  if(tab=="config") cargarConfig()
}

// =============================
// CONFIG
// =============================

async function cargarConfig(){
  try{
    const ref = doc(db,"config","general")
    const snap = await getDoc(ref)

    if(snap.exists()){
      config = snap.data()
    }else{
      await setDoc(ref,config)
    }

    document.getElementById("costoKg").value=config.costoKg
    document.getElementById("extraFil").value=config.extraFil
    document.getElementById("extraTime").value=config.extraTime
    document.getElementById("costoHora").value=config.costoHora
    document.getElementById("costoEnergia").value=config.costoEnergia

  }catch(e){
    console.error(e)
  }
}

// =============================
// COTIZACIONES
// =============================

async function guardarCot(){

  const data={
    desc: document.getElementById("figura").value,
    total: +document.getElementById("precio").value || 0,
    obs: document.getElementById("obs").value,
    link: document.getElementById("link").value,
    img: imgData || null,
    fecha: new Date()
  }

  try{

    if(editandoCotId){

      await updateDoc(doc(db,"cotizaciones",editandoCotId),data)
      toast("Cotización actualizada")

    }else{

      await addDoc(collection(db,"cotizaciones"),data)
      toast("Cotización guardada")

    }

    limpiarFormCot()
    cargarCot()

  }catch(e){
    console.error(e)
    toast("Error al guardar")
  }
}

async function cargarCot(){

  const listaDiv=document.getElementById("cotizacionesDiv")
  if(!listaDiv) return

  listaDiv.innerHTML=""

  const q=await getDocs(collection(db,"cotizaciones"))

  q.forEach(docu=>{

    const c=docu.data()
    const id=docu.id

    const card=document.createElement("div")
    card.className="card"

    card.innerHTML=`
      <div><b>${c.desc}</b></div>
      <div>$ ${( +c.total).toFixed(2)}</div>
      <div>
        <button onclick="editarCot('${id}')">✏️</button>
        <button onclick="pasarAVenta('${id}')">💵</button>
      </div>
    `

    listaDiv.appendChild(card)

  })
}

async function editarCot(id){

  editandoCotId=id

  const snap=await getDoc(doc(db,"cotizaciones",id))
  if(!snap.exists()) return

  const c=snap.data()

  document.getElementById("figura").value=c.desc
  document.getElementById("precio").value=c.total
  document.getElementById("obs").value=c.obs || ""
  document.getElementById("link").value=c.link || ""

  imgData=c.img || null

  mostrar("quotes", document.getElementById("tabQuotes"))
}

// =============================
// VENTAS
// =============================

async function guardarVenta(){

  const fechaInput=document.getElementById("ventaFecha").value

  const data={
    cliente: document.getElementById("cliente").value,
    desc: document.getElementById("ventaDesc").value,
    total: +document.getElementById("ventaPrecio").value || 0,
    obs: document.getElementById("ventaObs").value,
    pagado: document.getElementById("pagadoCheck").checked,
    fecha: new Date(fechaInput)
  }

  try{

    if(editandoVentaId){
      await updateDoc(doc(db,"ventas",editandoVentaId),data)
      toast("Venta actualizada")
    }else{
      await addDoc(collection(db,"ventas"),data)
      toast("Venta guardada")
    }

    limpiarFormVenta()
    cargarVentas()

  }catch(e){
    console.error(e)
    toast("Error al guardar venta")
  }
}

async function cargarVentas(){

  const ventasDiv=document.getElementById("ventasDiv")
  const resumenDiv=document.getElementById("resumenVentas")

  if(!ventasDiv) return

  ventasDiv.innerHTML=""

  let total=0
  let pagado=0
  let pendiente=0

  const q=await getDocs(collection(db,"ventas"))

  q.forEach(docu=>{

    const v=docu.data()
    const id=docu.id

    const monto=+v.total || 0

    total+=monto

    if(v.pagado) pagado+=monto
    else pendiente+=monto

    const fecha=v.fecha?.seconds
      ? new Date(v.fecha.seconds*1000)
      : new Date(v.fecha)

    const card=document.createElement("div")
    card.className="card"

    card.onclick=()=>verVentaDetalle(v)

    card.innerHTML=`
      <div><b>${v.cliente || "Cliente"}</b></div>
      <div>$ ${monto.toFixed(2)}</div>
      <div>${fecha.toLocaleDateString()}</div>
      <div>${v.pagado ? "✔ Pagado" : "Pendiente"}</div>
    `

    ventasDiv.appendChild(card)

  })

  if(resumenDiv){
    resumenDiv.innerHTML=`
      Total: $ ${total.toFixed(2)} | 
      Pagado: $ ${pagado.toFixed(2)} | 
      Pendiente: $ ${pendiente.toFixed(2)}
    `
  }
}

function verVentaDetalle(v){

  const detalle=document.getElementById("detalleVentaDiv")
  if(!detalle) return

  let imgHTML=""
  if(v.img) imgHTML=`<img src="${v.img}" style="max-width:200px;margin-top:10px">`

  const fecha=v.fecha?.seconds
    ? new Date(v.fecha.seconds*1000)
    : new Date(v.fecha)

  detalle.innerHTML=`
    <h3>Detalle de Venta</h3>
    <b>Cliente:</b> ${v.cliente || "-"}<br>
    <b>Descripción:</b> ${v.desc || "-"}<br>
    <b>Total:</b> $ ${( +v.total || 0).toFixed(2)}<br>
    <b>Fecha:</b> ${fecha.toLocaleDateString()}<br>
    <b>Estado:</b> ${v.pagado ? "Pagado" : "Pendiente"}<br>
    <b>Observaciones:</b> ${v.obs || "-"}<br>
    ${imgHTML}
  `
}

// =============================
// INIT
// =============================

window.addEventListener("load",()=>{

  const tabInicial=document.getElementById("tabCalc")
  mostrar("calc",tabInicial)

  cargarConfig()

  limpiarFormVenta()

})

</script>

</body>
</html>
