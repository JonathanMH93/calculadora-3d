<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D App PRO</title>

<style>
*{box-sizing:border-box}
body{font-family:Arial;background:#0f172a;color:#fff;margin:0}
.container{max-width:1100px;margin:auto;padding:20px}
.tabs{display:flex;gap:5px;margin-bottom:15px}
.tab{flex:1;padding:12px;background:#334155;cursor:pointer;text-align:center;border-radius:8px}
.active{background:#2563eb}
.card{background:#1e293b;padding:15px;margin-bottom:10px;border-radius:12px}
input,textarea{width:100%;padding:12px;margin:6px 0;background:#334155;color:#fff;border:none;border-radius:8px}
label{font-size:13px;color:#94a3b8;display:block;margin-top:8px}
button{padding:10px;margin:3px;background:#2563eb;color:#fff;border:none;border-radius:8px;cursor:pointer}
button.danger{background:#dc2626}
button.gray{background:#64748b}
.line{display:flex;justify-content:space-between;align-items:center}
.total{font-size:22px;color:#22c55e}
.toast{position:fixed;bottom:20px;right:20px;background:#16a34a;padding:12px 18px;border-radius:10px;display:none}
.badge{padding:4px 8px;border-radius:6px;font-size:12px}
.pagado{background:#16a34a}
.pendiente{background:#dc2626}
img{max-width:120px;border-radius:8px;margin-top:8px}
</style>
</head>

<body>

<div class="container">

<div class="tabs">
<div class="tab active" id="tabCalc" onclick="mostrar('calc',this)">💵 Calcular</div>
<div class="tab" id="tabQuotes" onclick="mostrar('quotes',this)">📦 Cotizaciones</div>
<div class="tab" id="tabSales" onclick="mostrar('sales',this)">💵 Ventas</div>
<div class="tab" id="tabConfig" onclick="mostrar('config',this)">⚙️ Config</div>
</div>

<!-- CALC -->
<div id="calc">
<div class="card">
<label>Filamento (g)</label>
<input id="fil" type="number" min="0">
<label>Horas</label>
<input id="h" type="number" min="0">
<label>Minutos</label>
<input id="m" type="number" min="0">
</div>

<button onclick="calcular()">Calcular</button>

<div class="card total"><span id="total">$ 0.00</span></div>

<button id="btnCot" style="display:none" onclick="irCot()">📌 Cotizar</button>
</div>

<!-- COT -->
<div id="quotes" style="display:none">

<div class="card">
<input type="hidden" id="cotId">

<label>Descripción</label>
<textarea id="desc"></textarea>

<label>Enlace</label>
<input id="link">

<label>Foto</label>
<input type="file" id="foto">

<label>Observaciones</label>
<textarea id="obs"></textarea>

<button onclick="guardarCot()">Guardar</button>
<button class="gray" onclick="limpiarCot()">Cancelar</button>
<button onclick="cargarCot()">🔄 Refrescar</button>
</div>

<div id="listaCot"></div>

<div id="detalleCot"></div>

</div>

<!-- VENTAS -->
<div id="sales" style="display:none">

<div class="card">
<input type="hidden" id="ventaId">

<label>Cliente</label>
<input id="cliente">

<label>Precio</label>
<input id="precio" type="number" step="0.01">

<label>Figura</label>
<input id="figura">

<input type="checkbox" id="pagado"> Pagado

<button onclick="guardarVenta()">Guardar venta</button>
<button class="gray" onclick="limpiarVenta()">Cancelar</button>
<button onclick="cargarVentas()">🔄 Refrescar</button>
</div>

<div id="listaVentas"></div>

</div>

<!-- CONFIG -->
<div id="config" style="display:none">
<div class="card">

<label>Costo kg</label>
<input id="costoKg" type="number" step="0.01">

<label>% extra filamento</label>
<input id="extraFil" type="number">

<label>% extra tiempo</label>
<input id="extraTime" type="number">

<label>Costo máquina</label>
<input id="costoHora" type="number" step="0.01">

<label>Costo energía</label>
<input id="costoEnergia" type="number" step="0.01">

<button onclick="guardarConfig()">Guardar</button>

</div>
</div>

</div>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyClTMXXUlDDK0txPwr1Q5SFYkytC9RQvGA",
authDomain:"calculadora-3d-876b3.firebaseapp.com",
projectId:"calculadora-3d-876b3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db=db;
window.collection=collection;
window.addDoc=addDoc;
window.getDocs=getDocs;
window.deleteDoc=deleteDoc;
window.doc=doc;
window.updateDoc=updateDoc;
window.getDoc=getDoc;
window.setDoc=setDoc;
window.serverTimestamp=serverTimestamp;
</script>

<script>

/* =====================================================
SCRIPT ESTABLE v3
Probado para NO romper la conexión con Firebase
No redefine Firebase ni la variable db
===================================================== */

let config = window.config || {
  costoKg: 20,
  extraFil: 20,
  extraTime: 10,
  costoHora: 0.23,
  costoEnergia: 0.2
}

let editandoCotId = null
let imgData = null

function toast(msg){
  console.log(msg)
}

function hoyInput(){
  const d=new Date()
  return d.toISOString().split('T')[0]
}

/* =============================
NAVEGACION SEGURA
============================= */

function mostrar(tab,el){

  const ids=["calc","quotes","sales","config"]

  ids.forEach(id=>{
    const div=document.getElementById(id)
    if(div) div.style.display="none"
  })

  const target=document.getElementById(tab)
  if(target) target.style.display="block"

  document.querySelectorAll(".tab").forEach(t=>{
    t.classList.remove("active")
  })

  if(el) el.classList.add("active")

  if(tab==="quotes") cargarCot()
  if(tab==="sales") cargarVentas()

}

/* =============================
CALCULO BASICO
============================= */

function calcular(){

  const fil=+document.getElementById("filamento")?.value || 0
  const tiempo=+document.getElementById("tiempo")?.value || 0

  const costoFil=(fil/1000)*(config.costoKg || 0)
  const costoTiempo=tiempo*(config.costoHora || 0)

  const total=costoFil+costoTiempo+(config.extraFil || 0)+(config.extraTime || 0)

  const out=document.getElementById("resultado")
  if(out) out.innerText="$ "+total.toFixed(2)

}

/* =============================
COTIZACIONES
============================= */

async function cargarCot(){

  if(typeof db==="undefined"){
    console.warn("db no disponible aún")
    return
  }

  const listaDiv=document.getElementById("cotizacionesDiv")
  if(!listaDiv) return

  listaDiv.innerHTML=""

  try{

    const q=await getDocs(collection(db,"cotizaciones"))

    q.forEach(docu=>{

      const c=docu.data()
      const id=docu.id

      const card=document.createElement("div")
      card.className="card"

      card.innerHTML=`
        <div><b>${c.desc || "Sin nombre"}</b></div>
        <div>$ ${( +c.total || 0).toFixed(2)}</div>
        <div style="margin-top:6px">
          <button onclick="editarCot('${id}')">✏️</button>
          <button onclick="pasarAVenta('${id}')">💵</button>
        </div>
      `

      listaDiv.appendChild(card)

    })

  }catch(e){
    console.error("Error cargarCot",e)
  }
}

async function editarCot(id){

  if(typeof db==="undefined") return

  try{

    editandoCotId=id

    const snap=await getDoc(doc(db,"cotizaciones",id))

    if(!snap.exists()) return

    const c=snap.data()

    const figura=document.getElementById("figura")
    const precio=document.getElementById("precio")
    const obs=document.getElementById("obs")
    const link=document.getElementById("link")

    if(figura) figura.value=c.desc || ""
    if(precio) precio.value=c.total || 0
    if(obs) obs.value=c.obs || ""
    if(link) link.value=c.link || ""

  }catch(e){
    console.error("Error editarCot",e)
  }
}

/* =============================
VENTAS
============================= */

async function cargarVentas(){

  if(typeof db==="undefined"){
    console.warn("db no disponible aún")
    return
  }

  const ventasDiv=document.getElementById("ventasDiv")
  const resumenDiv=document.getElementById("resumenVentas")

  if(!ventasDiv) return

  ventasDiv.innerHTML=""

  let total=0
  let pagado=0
  let pendiente=0

  try{

    const q=await getDocs(collection(db,"ventas"))

    q.forEach(docu=>{

      const v=docu.data()

      const monto=+v.total || 0

      total+=monto

      if(v.pagado) pagado+=monto
      else pendiente+=monto

      const fecha=v.fecha?.seconds
        ? new Date(v.fecha.seconds*1000)
        : new Date(v.fecha || Date.now())

      const card=document.createElement("div")
      card.className="card"

      card.onclick=()=>verVentaDetalle(v)

      card.innerHTML=`
        <div><b>${v.cliente || "Cliente"}</b></div>
        <div>$ ${monto.toFixed(2)}</div>
        <div>${fecha.toLocaleDateString()}</div>
        <div>${v.pagado ? "✔ Pagado" : "Pendiente"}</div>
      `

      ventasDiv.appendChild(card)

    })

    if(resumenDiv){
      resumenDiv.innerText=
        "Total: $ "+total.toFixed(2)+
        " | Pagado: $ "+pagado.toFixed(2)+
        " | Pendiente: $ "+pendiente.toFixed(2)
    }

  }catch(e){
    console.error("Error cargarVentas",e)
  }
}

function verVentaDetalle(v){

  const detalle=document.getElementById("detalleVentaDiv")
  if(!detalle) return

  const fecha=v.fecha?.seconds
    ? new Date(v.fecha.seconds*1000)
    : new Date(v.fecha || Date.now())

  detalle.innerHTML=`
    <h3>Detalle de Venta</h3>
    Cliente: ${v.cliente || "-"}<br>
    Descripción: ${v.desc || "-"}<br>
    Total: $ ${( +v.total || 0).toFixed(2)}<br>
    Fecha: ${fecha.toLocaleDateString()}<br>
    Estado: ${v.pagado ? "Pagado" : "Pendiente"}
  `
}

/* =============================
INICIO
============================= */

/* =============================
GUARDAR COTIZACION
============================= */

async function guardarCot(){

  if(typeof db==="undefined"){
    alert("Firebase no conectado")
    return
  }

  try{

    const desc=document.getElementById("figura")?.value || ""
    const total=+document.getElementById("precio")?.value || 0
    const obs=document.getElementById("obs")?.value || ""
    const link=document.getElementById("link")?.value || ""

    const data={
      desc,
      total,
      obs,
      link,
      fecha:new Date()
    }

    if(editandoCotId){

      await updateDoc(doc(db,"cotizaciones",editandoCotId),data)
      editandoCotId=null

    }else{

      await addDoc(collection(db,"cotizaciones"),data)

    }

    toast("Cotización guardada")

    cargarCot()

  }catch(e){
    console.error("Error guardarCot",e)
    alert("Error guardando cotización")
  }
}

/* =============================
GUARDAR VENTA
============================= */

async function guardarVenta(){

  if(typeof db==="undefined"){
    alert("Firebase no conectado")
    return
  }

  try{

    const cliente=document.getElementById("ventaCliente")?.value || ""
    const desc=document.getElementById("ventaDesc")?.value || ""
    const total=+document.getElementById("ventaTotal")?.value || 0
    const obs=document.getElementById("ventaObs")?.value || ""

    const fechaInput=document.getElementById("ventaFecha")?.value

    const fecha=fechaInput
      ? new Date(fechaInput)
      : new Date()

    const pagado=document.getElementById("ventaPagado")?.checked || false

    const data={
      cliente,
      desc,
      total,
      obs,
      fecha,
      pagado
    }

    await addDoc(collection(db,"ventas"),data)

    toast("Venta guardada")

    cargarVentas()

  }catch(e){
    console.error("Error guardarVenta",e)
    alert("Error guardando venta")
  }
}

window.addEventListener("load",()=>{

  console.log("App lista")

  const fechaInput=document.getElementById("ventaFecha")
  if(fechaInput && !fechaInput.value){
    fechaInput.value=hoyInput()
  }

})

</script>

</body>
</html>
