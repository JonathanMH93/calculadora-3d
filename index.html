<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3D App PRO</title>

<style>
*{box-sizing:border-box}
body{font-family:Arial;background:#0f172a;color:#fff;margin:0}
.container{max-width:1100px;margin:auto;padding:20px}
.tabs{display:flex;gap:5px;margin-bottom:15px}
.tab{flex:1;padding:12px;background:#334155;cursor:pointer;text-align:center;border-radius:8px}
.active{background:#2563eb}
.card{background:#1e293b;padding:15px;margin-bottom:10px;border-radius:12px}
input,textarea{width:100%;padding:12px;margin:6px 0;background:#334155;color:#fff;border:none;border-radius:8px}
label{font-size:13px;color:#94a3b8;display:block;margin-top:8px}
button{padding:10px;margin:3px;background:#2563eb;color:#fff;border:none;border-radius:8px;cursor:pointer}
.line{display:flex;justify-content:space-between;align-items:center}
.total{font-size:22px;color:#22c55e}
img{max-width:120px;border-radius:8px}
</style>
</head>

<body>

<div class="container">

<div class="tabs">
<div class="tab active" onclick="mostrar('calc',this)">💰 Calcular</div>
<div class="tab" onclick="mostrar('quotes',this)">📦 Cotizaciones</div>
<div class="tab" onclick="mostrar('sales',this)">💵 Ventas</div>
<div class="tab" onclick="mostrar('config',this)">⚙️ Config</div>
</div>

<!-- CALC -->
<div id="calc">
<div class="card">
<label>Filamento</label>
<input id="fil">
<label>Horas</label>
<input id="h">
<label>Minutos</label>
<input id="m">
</div>

<button onclick="calcular()">Calcular</button>

<div class="card total">$ <span id="total">0</span></div>

<button id="btnCot" style="display:none" onclick="irCot()">📌 Cotizar</button>
</div>

<!-- COT -->
<div id="quotes" style="display:none">

<div class="card">
<label>Descripción</label>
<textarea id="desc"></textarea>

<label>Enlace</label>
<input id="link">

<label>Foto</label>
<input type="file" id="foto">

<label>Observaciones</label>
<textarea id="obs"></textarea>

<button onclick="guardarCot()">Guardar</button>
</div>

<div id="listaCot"></div>
<div id="detalle"></div>

</div>

<!-- VENTAS -->
<div id="sales" style="display:none">

<div class="card">
<label>Cliente</label>
<input id="cliente">

<label>Precio</label>
<input id="precio">

<label>Figura</label>
<input id="figura">

<input type="checkbox" id="pagado"> Pagado

<button onclick="guardarVenta()">Guardar venta</button>
</div>

<div id="listaVentas"></div>

</div>

<!-- CONFIG -->
<div id="config" style="display:none">
<div class="card">

<label>Costo kg</label>
<input id="costoKg">

<label>% extra filamento</label>
<input id="extraFil">

<label>% extra tiempo</label>
<input id="extraTime">

<label>Costo máquina</label>
<input id="costoHora">

<label>Costo energía</label>
<input id="costoEnergia">

<button onclick="guardarConfig()">Guardar</button>

</div>
</div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyClTMXXUlDDK0txPwr1Q5SFYkytC9RQvGA",
authDomain:"calculadora-3d-876b3.firebaseapp.com",
projectId:"calculadora-3d-876b3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db=db;
window.collection=collection;
window.addDoc=addDoc;
window.getDocs=getDocs;
window.deleteDoc=deleteDoc;
window.doc=doc;
</script>

<script>

let config={costoKg:20,extraFil:20,extraTime:10,costoHora:0.23,costoEnergia:0.2}
let ultima={}
let cotizacionesCache=[]

// CALC
function calcular(){
let f=+fil.value||0
let h1=+h.value||0
let m1=+m.value||0

let total=((f*(1+config.extraFil/100)/1000)*config.costoKg)+
((h1+m1/60)*(1+config.extraTime/100)*(config.costoHora+config.costoEnergia))

total*=1.6

document.getElementById("total").innerText=total.toFixed(2)

ultima={f,h:h1,m:m1,total:total.toFixed(2)}

btnCot.style.display="block"
}

function irCot(){
mostrar("quotes",document.querySelectorAll(".tab")[1])
}

// COT
async function guardarCot(){
await addDoc(collection(db,"cotizaciones"),{
...ultima,
desc:desc.value
})
cargarCot()
}

async function cargarCot(){
let snap=await getDocs(collection(db,"cotizaciones"))
cotizacionesCache=[]
let html=""

snap.forEach(d=>{
let c={id:d.id,...d.data()}
cotizacionesCache.push(c)

html+=`
<div class="card line">
<div>${c.desc} - $${c.total}</div>
<div>
<button onclick="crearVenta('${c.id}')">💰</button>
<button onclick="eliminarCot('${c.id}')">🗑</button>
</div>
</div>`
})

listaCot.innerHTML=html
}

function crearVenta(id){

let c=cotizacionesCache.find(x=>x.id==id)

mostrar("sales",document.querySelectorAll(".tab")[2])

setTimeout(()=>{
document.getElementById("precio").value=c.total
document.getElementById("figura").value=c.desc
},50)
}

// VENTAS
async function guardarVenta(){
await addDoc(collection(db,"ventas"),{
cliente:cliente.value,
precio:+precio.value,
figura:figura.value,
pagado:pagado.checked
})
alert("Guardado")
}

// CONFIG
function cargarConfig(){
costoKg.value=config.costoKg
extraFil.value=config.extraFil
extraTime.value=config.extraTime
costoHora.value=config.costoHora
costoEnergia.value=config.costoEnergia
}

function guardarConfig(){
config.costoKg=+costoKg.value
config.extraFil=+extraFil.value
config.extraTime=+extraTime.value
config.costoHora=+costoHora.value
config.costoEnergia=+costoEnergia.value
alert("Guardado")
}

// UI
function mostrar(tab,el){

calc.style.display=tab=="calc"?"block":"none"
quotes.style.display=tab=="quotes"?"block":"none"
sales.style.display=tab=="sales"?"block":"none"
config.style.display=tab=="config"?"block":"none"

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
el.classList.add("active")

if(tab=="quotes")cargarCot()
if(tab=="config")cargarConfig()
}

</script>

</body>
</html>
