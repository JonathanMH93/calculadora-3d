<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3D App</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;margin:0}
.container{max-width:420px;margin:auto;padding:10px}
.tabs{display:flex}
.tab{flex:1;padding:10px;text-align:center;background:#334155;cursor:pointer}
.active{background:#2563eb}
.card{background:#1e293b;padding:10px;margin:5px 0;border-radius:10px}
input,textarea{width:100%;padding:6px;margin:4px 0;background:#334155;color:white;border:none;border-radius:6px}
button{padding:6px;margin:2px;background:#2563eb;color:white;border:none;border-radius:6px}
.line{display:flex;justify-content:space-between;align-items:center}
.total{color:#22c55e;font-size:18px}
</style>
</head>

<body>

<div class="container">

<div class="tabs">
<div class="tab active" onclick="tab('calc',this)">💰</div>
<div class="tab" onclick="tab('quotes',this)">📦</div>
<div class="tab" onclick="tab('sales',this)">💵</div>
</div>

<!-- CALC -->
<div id="calc">
<input id="fil" placeholder="Filamento (gr)">
<input id="h" placeholder="Horas">
<input id="m" placeholder="Minutos">
<button onclick="calc()">Calcular</button>
<div class="total">$ <span id="tot">0</span></div>
<button id="btnCot" style="display:none" onclick="tab('quotes',tabs[1])">Cotizar</button>
</div>

<!-- QUOTES -->
<div id="quotes" style="display:none">
<textarea id="desc" placeholder="Descripción"></textarea>
<button onclick="guardarCot()">Guardar cotización</button>
<div id="listaCot"></div>
<div id="detalle"></div>
</div>

<!-- SALES -->
<div id="sales" style="display:none">

<div class="card">
<input id="cliente" placeholder="Cliente">
<input id="precio" placeholder="Precio">
<input id="figura" placeholder="Figura">
<label><input type="checkbox" id="pagado"> Pagado</label>
<button onclick="guardarVenta()">Guardar venta</button>
</div>

<div id="listaVentas"></div>

<div class="card">
<div>💵 Pagado: $ <span id="tPagado">0</span></div>
<div>🧾 Pendiente: $ <span id="tPend">0</span></div>
<div class="total">📊 Total: $ <span id="tTotal">0</span></div>
</div>

</div>

</div>

<script>

let ultima={}

// CALC
function calc(){
let f=+fil.value||0
let h1=+h.value||0
let m1=+m.value||0

let total=(f*0.02+(h1+m1/60)*0.5)*1.6

tot.innerText=total.toFixed(2)
ultima={f,h:h1,m:m1,total:total.toFixed(2)}

btnCot.style.display="block"
}

// GUARDAR COT
function guardarCot(){
let lista=JSON.parse(localStorage.getItem("cot")||"[]")

lista.unshift({...ultima,desc:desc.value,fecha:new Date().toLocaleString()})

localStorage.setItem("cot",JSON.stringify(lista))

desc.value=""
cargarCot()
}

// LISTA COT
function cargarCot(){
let lista=JSON.parse(localStorage.getItem("cot")||"[]")
let html=""

lista.forEach((c,i)=>{
html+=`
<div class="card line">
<div onclick="verCot(${i})">${c.desc||"Sin nombre"} - $${c.total}</div>
<div>
<button onclick="crearVenta(${i})">💰</button>
<button onclick="delCot(${i})">🗑</button>
</div>
</div>`
})

listaCot.innerHTML=html
}

// DETALLE
function verCot(i){
let c=JSON.parse(localStorage.getItem("cot"))[i]

detalle.innerHTML=`
<div class="card">
<b>${c.desc}</b><br>
💰 $${c.total}<br>
⚖️ ${c.f}gr<br>
⏱ ${c.h}h ${c.m}m<br>
📅 ${c.fecha}
</div>`
}

// ELIMINAR
function delCot(i){
if(confirm("Eliminar?")){
let lista=JSON.parse(localStorage.getItem("cot"))
lista.splice(i,1)
localStorage.setItem("cot",JSON.stringify(lista))
cargarCot()
}
}

// CREAR VENTA
function crearVenta(i){
let c=JSON.parse(localStorage.getItem("cot"))[i]
tab('sales',tabs[2])

precio.value=c.total
figura.value=c.desc
}

// GUARDAR VENTA
function guardarVenta(){

if(!cliente.value){
alert("Cliente requerido")
return
}

if(!precio.value){
alert("Precio requerido")
return
}

let ventas=JSON.parse(localStorage.getItem("ventas")||"[]")

ventas.unshift({
cliente:cliente.value,
precio:+precio.value,
figura:figura.value,
pagado:pagado.checked,
fecha:new Date().toLocaleString()
})

localStorage.setItem("ventas",JSON.stringify(ventas))

cliente.value=""
precio.value=""
figura.value=""
pagado.checked=false

cargarVentas()
}

// LISTA VENTAS
function cargarVentas(){
let ventas=JSON.parse(localStorage.getItem("ventas")||"[]")

let html=""
let pag=0, pend=0

ventas.forEach((v,i)=>{

if(v.pagado) pag+=v.precio
else pend+=v.precio

html+=`
<div class="card line">
<div>
<b>${v.cliente}</b> - $${v.precio}<br>
${v.figura}<br>
${v.pagado?"✔ Pagado":"❌ Pendiente"}
</div>
<button onclick="delVenta(${i})">🗑</button>
</div>`
})

listaVentas.innerHTML=html
tPagado.innerText=pag.toFixed(2)
tPend.innerText=pend.toFixed(2)
tTotal.innerText=(pag+pend).toFixed(2)
}

// ELIMINAR VENTA
function delVenta(i){
if(confirm("Eliminar venta?")){
let ventas=JSON.parse(localStorage.getItem("ventas"))
ventas.splice(i,1)
localStorage.setItem("ventas",JSON.stringify(ventas))
cargarVentas()
}
}

// TABS
function tab(t,el){
calc.style.display=t=='calc'?'block':'none'
quotes.style.display=t=='quotes'?'block':'none'
sales.style.display=t=='sales'?'block':'none'

document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'))
el.classList.add('active')

if(t=='quotes') cargarCot()
if(t=='sales') cargarVentas()
}

</script>

</body>
</html>
