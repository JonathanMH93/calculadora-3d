<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D App PRO</title>

<style>
*{box-sizing:border-box}
body{font-family:Arial;background:#0f172a;color:#fff;margin:0}
.container{max-width:1100px;margin:auto;padding:20px}
.tabs{display:flex;gap:5px;margin-bottom:15px}
.tab{flex:1;padding:12px;background:#334155;cursor:pointer;text-align:center;border-radius:8px}
.active{background:#2563eb}
.card{background:#1e293b;padding:15px;margin-bottom:10px;border-radius:12px}
input,textarea{width:100%;padding:12px;margin:6px 0;background:#334155;color:#fff;border:none;border-radius:8px}
button{padding:10px;margin-top:8px;background:#2563eb;color:#fff;border:none;border-radius:8px;cursor:pointer}
button.danger{background:#dc2626}
.line{display:flex;justify-content:space-between;align-items:center}
.total{font-size:22px;color:#22c55e}
img{max-width:150px;border-radius:8px;margin-top:10px}
</style>
</head>

<body>

<div class="container">

<div class="tabs">
<div class="tab active" onclick="mostrar('calc',this)">💰 Calcular</div>
<div class="tab" onclick="mostrar('quotes',this)">📦 Cotizaciones</div>
<div class="tab" onclick="mostrar('sales',this)">💵 Ventas</div>
<div class="tab" onclick="mostrar('configTab',this)">⚙️ Config</div>
</div>

<!-- CALC -->
<div id="calc">
<div class="card">
<label>Filamento (g)</label>
<input id="fil" type="number">
<label>Horas</label>
<input id="h" type="number">
<label>Minutos</label>
<input id="m" type="number">
</div>

<button onclick="calcular()">Calcular</button>

<div class="card total">$ <span id="total">0.00</span></div>

<button id="btnCot" style="display:none" onclick="irCot()">Cotizar</button>
</div>

<!-- COTIZACIONES -->
<div id="quotes" style="display:none">

<div class="card">
<input type="hidden" id="cotId">

<label>Descripción</label>
<input id="desc">

<label>Enlace (opcional)</label>
<input id="link">

<label>Foto (opcional)</label>
<input type="file" id="foto">

<label>Observaciones</label>
<textarea id="obs"></textarea>

<button onclick="guardarCot()">Guardar</button>
<button onclick="limpiarCot()">Cancelar</button>
</div>

<div id="listaCot"></div>
<div id="detalleCot"></div>

</div>

<!-- VENTAS -->
<div id="sales" style="display:none">

<div class="card">

<input type="hidden" id="ventaId">

<label>Cliente</label>
<input id="cliente">

<label>Precio</label>
<input id="precio">

<label>Figura</label>
<input id="figura">

<label>Fecha</label>
<input type="date" id="fechaVenta">

<label>Pagado</label>
<input type="checkbox" id="pagado">

<button onclick="guardarVenta()">Guardar venta</button>
<button onclick="limpiarVenta()">Cancelar</button>

</div>

<div class="card">
<button onclick="setFiltro('all')">📋 Todas</button>
<button onclick="setFiltro('pagado')">✅ Pagadas</button>
<button onclick="setFiltro('pendiente')">⏳ Pendientes</button>
</div>

<div class="card" id="resumenVentas"></div>

<div id="listaVentas"></div>
<div id="detalleVenta"></div>

</div>

<!-- CONFIG -->
<div id="configTab" style="display:none">
<div class="card">

<label>Costo kg</label>
<input id="costoKg">

<label>% extra filamento</label>
<input id="extraFil">

<label>% extra tiempo</label>
<input id="extraTime">

<label>Costo máquina</label>
<input id="costoHora">

<label>Costo energía</label>
<input id="costoEnergia">

<button onclick="guardarConfig()">Guardar</button>

</div>
</div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyClTMXXUlDDK0txPwr1Q5SFYkytC9RQvGA",
authDomain:"calculadora-3d-876b3.firebaseapp.com",
projectId:"calculadora-3d-876b3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db=db;
window.collection=collection;
window.addDoc=addDoc;
window.getDocs=getDocs;
window.deleteDoc=deleteDoc;
window.doc=doc;
window.setDoc=setDoc;
window.getDoc=getDoc;
window.updateDoc=updateDoc;
</script>

<script>

let configData={costoKg:20,extraFil:20,extraTime:10,costoHora:0.23,costoEnergia:0.2}
let ultima={}
let cotizacionesCache=[]
let ventasCache=[]
let filtroVenta="all"

// CONFIG
async function cargarConfig(){
let ref=doc(db,"config","default")
let snap=await getDoc(ref)

if(snap.exists()) configData=snap.data()
else await setDoc(ref,configData)

costoKg.value=configData.costoKg
extraFil.value=configData.extraFil
extraTime.value=configData.extraTime
costoHora.value=configData.costoHora
costoEnergia.value=configData.costoEnergia
}

async function guardarConfig(){
configData={
costoKg:+costoKg.value||0,
extraFil:+extraFil.value||0,
extraTime:+extraTime.value||0,
costoHora:+costoHora.value||0,
costoEnergia:+costoEnergia.value||0
}
await setDoc(doc(db,"config","default"),configData)
alert("Configuración guardada")
}

// CALC
function calcular(){
let f=+fil.value||0
let h1=+h.value||0
let m1=+m.value||0

let total=((f*(1+configData.extraFil/100)/1000)*configData.costoKg)+
((h1+m1/60)*(1+configData.extraTime/100)*(configData.costoHora+configData.costoEnergia))

total*=1.6
total=Number(total.toFixed(2))

document.getElementById("total").innerText=total.toFixed(2)

ultima={f,h:h1,m:m1,total}

btnCot.style.display="block"
}

function irCot(){
mostrar("quotes",document.querySelectorAll(".tab")[1])
}

// ===== COTIZACIONES =====

function limpiarCot(){
cotId.value=""
desc.value=""
link.value=""
obs.value=""
foto.value=""
}

function fileToBase64(file){
return new Promise((resolve,reject)=>{
let reader=new FileReader()
reader.readAsDataURL(file)
reader.onload=()=>resolve(reader.result)
reader.onerror=reject
})
}

async function guardarCot(){

if(!desc.value) return alert("Descripción requerida")

let imgData=""

if(foto.files[0]){
imgData = await fileToBase64(foto.files[0])
}

let data={
...ultima,
desc:desc.value,
link:link.value,
obs:obs.value,
img:imgData,
total:Number(ultima.total.toFixed(2))
}

if(cotId.value){
await updateDoc(doc(db,"cotizaciones",cotId.value),data)
alert("Cotización actualizada")
}else{
await addDoc(collection(db,"cotizaciones"),data)
alert("Cotización guardada")
}

limpiarCot()
cargarCot()
}

async function cargarCot(){

let snap=await getDocs(collection(db,"cotizaciones"))
cotizacionesCache=[]

let html=""

snap.forEach(d=>{
let c={id:d.id,...d.data()}
cotizacionesCache.push(c)

html+=`
<div class="card line" onclick="verDetalleCot('${c.id}')">
<div>
<b>${c.desc}</b><br>
$${Number(c.total).toFixed(2)}
</div>

<div>
<button onclick="event.stopPropagation(); editarCot('${c.id}')">✏️</button>
<button onclick="event.stopPropagation(); crearVenta('${c.id}')">💵</button>
<button onclick="event.stopPropagation(); eliminarCot('${c.id}')">🗑</button>
</div>
</div>`
})

listaCot.innerHTML=html
}

function verDetalleCot(id){

let c=cotizacionesCache.find(x=>x.id==id)

detalleCot.innerHTML=`
<div class="card">
<h3>${c.desc}</h3>
<b>Total:</b> $${Number(c.total).toFixed(2)}<br><br>

<b>Observaciones:</b><br>
${c.obs || "-"}<br><br>

<b>Enlace:</b><br>
${c.link ? `<a href="${c.link}" target="_blank">Ver modelo</a>` : "-"}<br>

${c.img ? `<img src="${c.img}">` : ""}
</div>
`
}

function editarCot(id){
let c=cotizacionesCache.find(x=>x.id==id)

cotId.value=c.id
desc.value=c.desc||""
link.value=c.link||""
obs.value=c.obs||""

mostrar("quotes",document.querySelectorAll(".tab")[1])
}

async function eliminarCot(id){
if(!confirm("Eliminar cotización?")) return
await deleteDoc(doc(db,"cotizaciones",id))
cargarCot()
}

function crearVenta(id){
let c=cotizacionesCache.find(x=>x.id==id)

mostrar("sales",document.querySelectorAll(".tab")[2])

setTimeout(()=>{
precio.value=c.total
figura.value=c.desc
},50)
}

// ===== VENTAS =====

function limpiarVenta(){
ventaId.value=""
cliente.value=""
precio.value=""
figura.value=""
pagado.checked=false
fechaVenta.value=""
}

async function guardarVenta(){

if(!cliente.value) return alert("Cliente requerido")

let fechaVal = fechaVenta.value 
  ? new Date(fechaVenta.value)
  : new Date()

let data={
cliente:cliente.value,
precio:Number((+precio.value||0).toFixed(2)),
figura:figura.value,
pagado:pagado.checked,
fecha:fechaVal
}

if(ventaId.value){
await updateDoc(doc(db,"ventas",ventaId.value),data)
alert("Venta actualizada")
}else{
await addDoc(collection(db,"ventas"),data)
alert("Venta guardada")
}

limpiarVenta()
cargarVentas()
}

function setFiltro(tipo){
filtroVenta=tipo
cargarVentas()
}

async function cargarVentas(){

let snap=await getDocs(collection(db,"ventas"))
ventasCache=[]

let total=0
let totalPagado=0
let totalPendiente=0

let html=""

snap.forEach(d=>{
let v={id:d.id,...d.data()}
ventasCache.push(v)

if(filtroVenta==="pagado" && !v.pagado) return
if(filtroVenta==="pendiente" && v.pagado) return

let fecha = v.fecha?.seconds
  ? new Date(v.fecha.seconds * 1000)
  : new Date()

let precio = Number(v.precio||0)

total += precio
if(v.pagado) totalPagado += precio
else totalPendiente += precio

html+=`
<div class="card line" onclick="verDetalleVenta('${v.id}')">

<div>
<b>${v.cliente}</b><br>
$${precio.toFixed(2)}<br>
${fecha.toLocaleDateString()}<br>

<span style="color:${v.pagado?"#22c55e":"#ef4444"}">
${v.pagado?"Pagado":"Pendiente"}
</span>
</div>

<div>
<button onclick="event.stopPropagation(); editarVenta('${v.id}')">✏️</button>
<button onclick="event.stopPropagation(); togglePagado('${v.id}')">✔</button>
<button onclick="event.stopPropagation(); eliminarVenta('${v.id}')">🗑</button>
</div>

</div>`
})

listaVentas.innerHTML=html

resumenVentas.innerHTML=`
<b>Total:</b> $${total.toFixed(2)}<br>
<b>Pagado:</b> $${totalPagado.toFixed(2)}<br>
<b>Pendiente:</b> $${totalPendiente.toFixed(2)}
`
}

function verDetalleVenta(id){

let v=ventasCache.find(x=>x.id==id)

let fecha = v.fecha?.seconds
  ? new Date(v.fecha.seconds * 1000)
  : new Date()

detalleVenta.innerHTML=`
<div class="card">
<h3>${v.figura}</h3>

<b>Cliente:</b> ${v.cliente}<br>
<b>Precio:</b> $${Number(v.precio).toFixed(2)}<br>
<b>Fecha:</b> ${fecha.toLocaleDateString()}<br>
<b>Estado:</b> ${v.pagado?"Pagado":"Pendiente"}

</div>
`
}

function editarVenta(id){

let v=ventasCache.find(x=>x.id==id)

ventaId.value=v.id
cliente.value=v.cliente
precio.value=v.precio
figura.value=v.figura
pagado.checked=v.pagado

let fecha = v.fecha?.seconds
  ? new Date(v.fecha.seconds * 1000)
  : new Date()

fechaVenta.value = fecha.toISOString().split("T")[0]

mostrar("sales",document.querySelectorAll(".tab")[2])
}

async function togglePagado(id){

let v=ventasCache.find(x=>x.id==id)

await updateDoc(doc(db,"ventas",id),{
pagado: !v.pagado
})

cargarVentas()
}

async function eliminarVenta(id){
if(!confirm("Eliminar venta?")) return
await deleteDoc(doc(db,"ventas",id))
cargarVentas()
}

// UI
function mostrar(tab,el){

document.getElementById("calc").style.display="none"
document.getElementById("quotes").style.display="none"
document.getElementById("sales").style.display="none"
document.getElementById("configTab").style.display="none"

document.getElementById(tab).style.display="block"

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
el.classList.add("active")

if(tab=="quotes") cargarCot()
if(tab=="sales") cargarVentas()
if(tab=="configTab") cargarConfig()
}

window.onload=()=>{
mostrar("calc",document.querySelectorAll(".tab")[0])
}

</script>

</body>
</html>
